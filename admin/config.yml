backend:
  name: git-gateway
  branch: main

media_folder: uploads
public_folder: /uploads

collections:
  - name: site_content
    label: LawBridge Website Content
    files:
      - label: Main Website Text
        name: main_website_text
        file: content/site.json
        fields:
          - label: Home Page
            name: home
            widget: object
            fields:
              - label: Hero Eyebrow
                name: eyebrow
                widget: string
              - label: Hero Title
                name: title
                widget: text
              - label: Hero Intro
                name: intro
                widget: text
              - label: Primary Button
                name: primary_button
                widget: string
              - label: Secondary Button
                name: secondary_button
                widget: string
              - label: Third Button
                name: third_button
                widget: string
